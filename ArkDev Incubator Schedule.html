document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    // Nested page bundles (iframe targets). Each ships ONCE, in the ROOT
    // document's manifest; frame srcs carry an about:blank#<uuid> marker
    // instead of a substitutable uuid. Every document mints the blobs for
    // its OWN frames — from local text at the root, or text obtained from
    // its DIRECT parent over the relay protocol below — so each frame
    // navigation stays same-origin with its initiator and a deduped page
    // loads at any depth on any host, including a file:// download's
    // opaque origins (where a blob minted by one document cannot be
    // navigated to by another).
    const pageOrderEl = document.querySelector('script[type="__bundler/page_order"]');
    const pageOrder = pageOrderEl ? JSON.parse(pageOrderEl.textContent) : [];
    const pageSet = new Set(pageOrder);
    const pageTexts = {};

    // ── Nested-page text protocol (parent-chain relay) ──
    // Page bundles ship once, in the ROOT document's manifest. Every
    // document mints the blobs for its OWN frames, obtaining page text
    // through a strict parent-chain relay: a document only ever SENDS to
    // its direct parent (which, for every document the publisher's own
    // runtime minted, is another publisher document) and only ACCEPTS
    // text from that direct parent; requests from below are honored only
    // for the document's own child frames, and the ROOT never sends
    // upward at all. That last rule is load-bearing: the artifact host's
    // frame-ancestors allows claude.ai (and friends) to frame an
    // artifact, so window.top can be a FOREIGN document — a top-addressed
    // protocol would hand page uuids to that ancestor and accept forged
    // "page text" from it, minting attacker HTML as an artifact-origin
    // blob document. The chain never touches the ancestor: requests stop
    // at the root, replies are origin-addressed per hop (never '*' when
    // an origin exists), and both directions are origin-gated (on https
    // a foreign sender's origin can never equal this document's; in
    // opaque contexts — file:// — everything serializes as 'null', where
    // an embedded EXTERNAL frame still fails the gate by carrying its
    // own real origin, and a sandboxed child of such a frame is excluded
    // by the own-child-frames check plus uuid unguessability). Shape is
    // deny-by-default: one request form, one reply form, no error
    // replies.
    // window.origin is the SERIALIZED SECURITY origin ('null' in opaque
    // contexts such as a sandboxed preview iframe) — location.origin is
    // computed from the URL and stays 'https://…' even when the document
    // is sandboxed, which would misgate every opaque chain.
    const OWN_TARGET = /^https?:[/][/]/.test(window.origin || '')
      ? window.origin
      : '*';
    function trustedOrigin(e) {
      if (e.origin === window.origin) return true; // https chains; opaque==opaque
      // file:// trees: Chrome serializes the file document's origin as
      // 'file://' while the blob: documents it mints serialize as 'null',
      // so the two legitimate shapes can never string-match — accept the
      // pair in both directions. https origins never serialize as either,
      // and sender identity (own child frame / direct parent) is checked
      // separately.
      return (
        (e.origin === 'null' &&
          (window.origin === 'file://' ||
            window.location.protocol === 'file:')) ||
        (/^file:/.test(e.origin) && window.origin === 'null')
      );
    }
    // Non-empty only in the root document (nested bundles ship an empty
    // island), so it doubles as the root marker: the root answers from
    // local text and treats a miss as authoritative — never relaying to
    // its (possibly foreign) parent.
    const isPageRoot = pageOrder.length > 0;
    const blobUrls = {};
    const resourceBlobs = {};
    const UUID_SHAPE = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/;
    const pendingFrames = {}; // uuid -> [{el, frag}] awaiting text for own frames
    const pendingRelays = {}; // uuid -> [childWindow] awaiting text to pass down
    function mountPage(el, frag, text) {
      const pageBlob = new Blob([text], { type: 'text/html' });
      const u = URL.createObjectURL(pageBlob);
      resourceBlobs[u] = pageBlob;
      el.src = u + frag;
    }
    function deliverPage(uuid, text) {
      const frames = pendingFrames[uuid];
      delete pendingFrames[uuid];
      if (frames) for (const f of frames) mountPage(f.el, f.frag, text);
      const relays = pendingRelays[uuid];
      delete pendingRelays[uuid];
      if (relays) {
        for (const cw of relays) {
          try { cw.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
        }
      }
    }
    function ownFrameWindows() {
      const out = [];
      for (const f of Array.from(document.querySelectorAll('iframe'))) {
        try { if (f.contentWindow) out.push(f.contentWindow); } catch (err) { /* detached */ }
      }
      return out;
    }
    window.addEventListener('message', function (e) {
      const d = e.data;
      if (!d || typeof d !== 'object' || !e.source) return;
      // Origin gate first; the structural checks below (own-child-frames
      // for requests, direct-parent + solicited-uuid for replies, the
      // root's never-relay rule) are what hold in fully opaque chains
      // where origin strings can't discriminate — a sandboxed root's
      // FOREIGN wrapper still fails all three even though both serialize
      // as real-vs-'null' rather than matching.
      if (!trustedOrigin(e)) return;
      if (typeof d.__bundler_need === 'string' && UUID_SHAPE.test(d.__bundler_need)) {
        // Requests are honored only for this document's own child frames.
        if (ownFrameWindows().indexOf(e.source) < 0) return;
        const uuid = d.__bundler_need;
        const text = pageTexts[uuid];
        if (typeof text === 'string') {
          try { e.source.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
          return;
        }
        if (isPageRoot || window.parent === window) return; // authoritative miss
        const waiting = pendingRelays[uuid];
        if (waiting) {
          if (waiting.indexOf(e.source) < 0) waiting.push(e.source);
          return;
        }
        // Never-answered uuids would otherwise accumulate forever under a
        // request spray; past the cap (far above any real page count) new
        // relays are dropped rather than remembered.
        if (Object.keys(pendingRelays).length >= 128) return;
        pendingRelays[uuid] = [e.source];
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      } else if (
        typeof d.__bundler_page === 'string' &&
        UUID_SHAPE.test(d.__bundler_page) &&
        typeof d.__bundler_text === 'string'
      ) {
        // The shape test is load-bearing beyond tidiness: the solicited
        // check below uses the in operator, which matches prototype keys
        // ('__proto__', 'constructor') — an unshaped key would reach
        // deliverPage and throw, painting the error banner.
        // Text is accepted only from the direct parent — the document
        // that minted this one.
        if (e.source !== window.parent || window.parent === window) return;
        if (!(d.__bundler_page in pendingFrames) && !(d.__bundler_page in pendingRelays)) return;
        deliverPage(d.__bundler_page, d.__bundler_text);
      }
    });

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (pageSet.has(uuid)) {
          pageTexts[uuid] = new TextDecoder().decode(finalBytes);
          return;
        }
        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    // Page uuids have no blob here — they ride inside about:blank#<uuid>
    // frame markers the pass below resolves after the swap.
    for (const uuid of uuids) {
      if (pageSet.has(uuid)) continue;
      template = template.split(uuid).join(blobUrls[uuid]);
    }

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);

    // Resolve page-frame markers: mint this document's own blob for each
    // framed page — from local text when this is the root, otherwise by
    // asking the direct parent over the relay protocol above. An
    // unanswered request leaves the frame on about:blank, the same
    // degraded state as a refused embed.
    {
      const MARKER = /^about:blank#([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})(#.*)?$/;
      const needed = [];
      for (const el of Array.from(document.querySelectorAll('iframe'))) {
        const m = MARKER.exec(el.getAttribute('src') || '');
        if (!m) continue;
        const text = pageTexts[m[1]];
        if (typeof text === 'string') {
          mountPage(el, m[2] || '', text);
        } else if (window.parent !== window && !isPageRoot) {
          const had = pendingFrames[m[1]];
          (pendingFrames[m[1]] = had || []).push({ el: el, frag: m[2] || '' });
          if (!had) needed.push(m[1]);
        }
      }
      for (const uuid of needed) {
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      }
    }

    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

le }}\">\n                      <span style=\"{{ s.timeChipStyle }}\">{{ s.dayNum }} · {{ s.time }}<\u002Fspan>\n                      <span style=\"flex:1;text-align:left;min-width:0;\">\n                        <span style=\"display:block;font-weight:700;{{ s.titleColor }}\">{{ s.titleLine }}<\u002Fspan>\n                        <span style=\"{{ s.dateStyle }}\">{{ s.date }}<\u002Fspan>\n                      <\u002Fspan>\n                      <span style=\"{{ s.arrowStyle }}\">→<\u002Fspan>\n                    <\u002Fbutton>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n    <\u002Fsc-if>\n\n    <div style=\"{{ footerStyle }}\">ArkDev Incubator · Facilitator schedule · view-only<\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- Modal -->\n  <sc-if value=\"{{ modalShow }}\" hint-placeholder-val=\"{{ false }}\">\n    <div sc-camel-on-click=\"{{ onOverlayClick }}\" style=\"position:fixed;inset:0;background:rgba(6,8,12,0.62);backdrop-filter:blur(3px);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px;animation:akfade .18s ease;\">\n      <div data-modal-card=\"\" style=\"{{ modalCardStyle }}\" class=\"ak-scroll\">\n        <button sc-camel-on-click=\"{{ closeModal }}\" style=\"{{ modalCloseStyle }}\">×<\u002Fbutton>\n        <div style=\"{{ modalTimeStyle }}\">{{ modalTime }}<\u002Fdiv>\n        <h3 style=\"{{ modalTitleStyle }}\">{{ modalTitle }}<\u002Fh3>\n        <sc-if value=\"{{ modalBody }}\" hint-placeholder-val=\"{{ false }}\">\n          <p style=\"{{ modalBodyStyle }}\">{{ modalBody }}<\u002Fp>\n        <\u002Fsc-if>\n        <div style=\"{{ modalLabelStyle }}\">Facilitator<\u002Fdiv>\n        <div style=\"display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px;\">\n          <sc-for list=\"{{ modalFacs }}\" as=\"f\" hint-placeholder-count=\"1\">\n            <span style=\"{{ f.chipStyl EK_COLORS = { 1: '#E2711D', 2: '#C4432E', 3: '#B8842A', 4: '#97271B' };\n    this.dragSrc = null;\n    this.state = {\n      theme: props.defaultTheme === 'light' ? 'light' : 'dark',\n      tab: 'schedule',\n      facFilter: null,\n      editMode: false,\n      selectedFac: null,\n      facSearch: '',\n      modalIdx: null,\n      content: null,\n      activeWeek: 'all',\n      isMobile: (typeof window !== 'undefined' && window.innerWidth < 760),\n      highlightDay: null,\n    };\n    this.built = false;\n    this.dayEls = {};\n  }\n\n  componentDidMount() {\n    this.build();\n    this.onResize = () => this.setState({ isMobile: window.innerWidth < 760 });\n    window.addEventListener('resize', this.onResize);\n  }\n  componentWillUnmount() {\n    if (this.onResize) window.removeEventListener('resize', this.onResize);\n  }\n\n  build() {\n    const raw = window.ARKDEV_SCHEDULE || [];\n    if (!raw.length) { setTimeout(() => this.build(), 60); return; }\n    this.headers = [];\n    this.days = [];\n    const orig = [];\n    let idx = 0;\n    const MONTHS = { January: 0, February: 1, March: 2, April: 3, May: 4, June: 5, July: 6, August: 7, September: 8, October: 9, November: 10, December: 11 };\n    raw.forEach(d => {\n      const start = idx;\n      d.blocks.forEach(b => {\n        this.headers.push({ week: d.week, day: d.day, date: d.date, title: d.title, note: d.note, time: b.time, blockIdx: idx - start });\n        orig.push({ topic: b.topic, facilitator: b.facilitator, output: b.output });\n        idx++;\n      });\n      const parts = d.date.split(',');\n      const dayNum = parseInt(parts[0].trim().split(' ')[1], 10);\n      const monthName = (parts[1] || '').trim();\n      const dateObj = new Date(2026, MONTHS[monthName] ?? 6, dayNum || 1);\n      this.days.push({ week: d.week, day: d.day, date: d.date, title: d.title, note: d.note, start, count: d.blocks.length, dateObj });\n    });\n    this.origContent = JSON.parse(JSON.stringify(orig));\n    let content = JSON.parse(JSON.stringify(orig));\n    try {\n      const s = localStorage.getItem(this.KEY);\n      if (s) { const p = JSON.parse(s); if (Array.isArray(p) && p.length === content.length) content = p; }\n    } catch (e) {}\n    const facs = this.allFacilitators(content);\n\n    const today = new Date(); today.setHours(0, 0, 0, 0);\n    this.todayMidnight = today.getTime();\n    const exact = this.days.find(d => d.dateObj.getTime() === today.getTime());\n    const upcoming = exact || this.days.find(d => d.dateObj.getTime() >= today.getTime()) || this.days[this.days.length - 1];\n    this.todayDayNum = upcoming.day;\n    this.isExactToday = !!exact;\n\n    this.built = true;\n    this.setState({ content, selectedFac: facs[0] || null });\n  }\n\n  persist() { try { localStorage.setItem(this.KEY, JSON.stringify(this.state.content)); } catch (e) {} }\n\n  scrollToDay(dayNum) {\n    const d = this.days.find(x => x.day === dayNum);\n    if (!d) return;\n    this.setState({ activeWeek: 'all', highlightDay: dayNum, tab: 'schedule' }, () => {\n      requestAnimationFrame(() => {\n        const el = this.dayEls[dayNum];\n        if (el) {\n          const rect = el.getBoundingClientRect();\n          window.scrollTo({ top: rect.top + window.scrollY - 96, behavior: 'smooth' });\n        }\n      });\n      setTimeout(() => { if (this.state.highlightDay === dayNum) this.setState({ highlightDay: null }); }, 2200);\n    });\n  }\n\n  parseFacs(str) {\n    if (!str) return [];\n    let s = str.replace(/\\([^)]*\\)/g, ' ').replace(/incl\\.?/gi, ',');\n    return s.split(/[\\/,]| and /i).map(x => x.trim()).filter(Boolean);\n  }\n  allFacilitators(content) {\n    const set = new Set();\n    content.forEach(c => this.parseFacs(c.facilitator).forEach(f => set.add(f)));\n    return [...set].sort((a, b) => a.localeCompare(b));\n  }\n  hue(name) { let h = 0; for (let i = 0; i < name.length; i++) h = name.charCodeAt(i) + ((h << 5) - h); return Math.abs(h) % 360; }\n  initials(name) { return name.split(/\\s+/).map(w => w[0]).join('').slice(0, 2).toUpperCase(); }\n\n  palette() {\n    const dark = this.state.theme === 'dark';\n    return dark ? {\n      dark: true, bg: '#0A0C11', panel: '#141926', panel2: '#1B2233', elev: '#20293B',\n      border: 'rgba(255,255,255,0.09)', border2: 'rgba(255,255,255,0.14)',\n      text: '#EDEFF3', muted: '#8B93A5', faint: '#5C6577',\n    } : {\n      dark: false, bg: '#F3F1EA', panel: '#FFFFFF', panel2: '#FBFAF6', elev: '#FFFFFF',\n      border: '#E7E2D6', border2: '#DBD4C4',\n      text: '#1A2130', muted: '#6B7385', faint: '#9AA1B0',\n    };\n  }\n  accentGrad() { return `linear-gradient(120deg, ${this.props.accentStart || '#F39200'}, ${this.props.accentEnd || '#E62D25'})`; }\n  accentSolid() { return this.props.accentEnd || '#E62D25'; }\n\n  chip(name, P) {\n    const h = this.hue(name);\n    return P.dark\n      ? { bg: `hsla(${h},60%,60%,0.16)`, text: `hsl(${h},75%,74%)`, dot: `hsl(${h},65%,62%)` }\n      : { bg: `hsl(${h},62%,93%)`, text: `hsl(${h},48%,32%)`, dot: `hsl(${h},52%,46%)` };\n  }\n  chipStyle(name, P) {\n    const c = this.chip(name, P);\n    return `font-size:10.5px;font-weight:700;padding:2px 9px;border-radius:20px;background:${c.bg};color:${c.text};white-space:nowrap;`;\n  }\n\n  makeBlock(i, P) {\n    const h = this.headers[i];\n    const c = this.state.content[i];\n    const facs = this.parseFacs(c.facilitator);\n    const has = !!c.topic;\n    const titleLine = has ? c.topic.split('\\n')[0] : 'Free time';\n    const highlighted = this.state.facFilter && facs.includes(this.state.facFilter);\n    const dimmed = this.state.facFilter && !facs.includes(this.state.facFilter);\n    let border = has ? `1px solid ${P.border}` : `1px dashed ${P.border2}`;\n    let shadow = 'none';\n    if (highlighted) { border = `1.5px solid ${this.accentSolid()}`; shadow = `0 0 0 3px ${P.dark ? 'rgba(230,45,37,0.18)' : 'rgba(230,45,37,0.12)'}`; }\n    const style = [\n      `background:${has ? P.panel : 'transparent'}`,\n      `border:${border}`, `border-radius:12px`, `padding:11px 12px`, `min-height:112px`,\n      `display:flex`, `flex-direction:column`,\n      `cursor:${this.state.editMode ? 'grab' : 'pointer'}`,\n      `opacity:${dimmed ? '0.28' : '1'}`,\n      `box-shadow:${shadow}`, `transition:box-shadow .15s,opacity .15s,transform .1s`,\n      `color:${P.text}`,\n    ].join(';');\n    return {\n      time: h.time,\n      timeStyle: `font-size:10px;font-weight:800;letter-spacing:.3px;color:${P.faint};margin-bottom:5px;`,\n      titleLine,\n      titleLineStyle: `font-size:12.5px;font-weight:700;line-height:1.32;margin-bottom:7px;color:${has ? P.text : P.faint};display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;`,\n      facs: facs.map(f => ({ name: f, chipStyle: this.chipStyle(f, P) })),\n      style,\n      draggable: this.state.editMode ? 'true' : 'false',\n      onOpen: () => this.setState({ modalIdx: i }),\n      onDragStart: (e) => { this.dragSrc = i; if (e.dataTransfer) e.dataTransfer.effectAllowed = 'move'; },\n      onDragOver: (e) => { if (this.state.editMode) e.preventDefault(); },\n      onDrop: (e) => {\n        e.preventDefault();\n        if (!this.state.editMode || this.dragSrc == null || this.dragSrc === i) return;\n        const arr = [...this.state.content];\n        const t = arr[this.dragSrc]; arr[this.dragSrc] = arr[i]; arr[i] = t;\n        this.dragSrc = null;\n        this.setState({ content: arr }, () => this.persist());\n      },\n    };\n  }\n\n  renderVals() {\n    const P = this.palette();\n    const ready = this.built && this.state.content;\n    const accent = this.accentGrad();\n    const accentSolid = this.accentSolid();\n    const M = this.state.isMobile;\n    const btnBase = `font-family:Manrope,sans-serif;font-size:12.5px;font-weight:700;padding:8px 15px;border-radius:9px;cursor:pointer;border:1px solid ${P.border2};background:${P.dark ? 'rgba(255,255,255,0.05)' : '#fff'};color:${P.text};transition:background .15s,transform .1s;`;\n\n    const base = {\n      rootStyle: `min-height:100vh;background:${P.bg};color:${P.text};font-family:Manrope,-apple-system,sans-serif;font-size:14px;`,\n      headerStyle: `display:flex;justify-content:space-between;align-items:center;gap:20px;padding:24px 0 20px 0;flex-wrap:${M ? 'wrap' : 'nowrap'};`,\n      headerLeftStyle: `display:flex;align-items:center;gap:16px;flex:1;min-width:0;flex-wrap:${M ? 'wrap' : 'nowrap'};`,\n      headerRightStyle: `display:flex;align-items:center;gap:10px;flex-shrink:0;`,\n      dividerStyle: `width:1px;height:40px;background:${P.border};`,\n      eyebrowStyle: `font-family:Sora,sans-serif;font-size:11px;font-weight:700;letter-spacing:1.6px;text-transform:uppercase;color:${accentSolid};margin-bottom:3px;`,\n      introStyle: `font-size:14px;font-weight:600;color:${P.text};max-width:560px;line-height:1.4;`,\n      introText: this.props.introText || 'ArkDev Incubator Program — Full Schedule (11:00 AM – 7:30 PM daily, 3 days/week, 4 weeks)',\n      ghostBtnStyle: btnBase,\n      editBtnStyle: this.state.editMode\n        ? `font-family:Manrope,sans-serif;font-size:12.5px;font-weight:800;padding:8px 15px;border-radius:9px;cursor:pointer;border:none;background:${accent};color:#fff;`\n        : btnBase,\n      themeLabel: P.dark ? '☀︎ Light' : '☾ Dark',\n      editMode: this.state.editMode,\n      editLabel: this.state.editMode ? '✓ Editing' : '🔒 Edit',\n      toggleTheme: () => this.setState({ theme: P.dark ? 'light' : 'dark' }),\n      toggleEditLock: () => {\n        if (this.state.editMode) { this.setState({ editMode: false }); return; }\n        const code = window.prompt('Enter edit passcode');\n        if (code === null) return;\n        if (code === (this.props.editPasscode || 'arkdev')) this.setState({ editMode: true });\n        else window.alert('Incorrect passcode — staying in view-only mode.');\n      },\n      resetSchedule: () => this.setState({ content: JSON.parse(JSON.stringify(this.origContent)), facFilter: null }, () => this.persist()),\n      tabbarStyle: `display:flex;align-items:center;gap:4px;border-bottom:1px solid ${P.border};`,\n      tabScheduleStyle: this.tabStyle('schedule', P, accentSolid),\n      tabFacStyle: this.tabStyle('facilitators', P, accentSolid),\n      editHintStyle: `margin-left:12px;font-size:11.5px;font-weight:700;color:${accentSolid};`,\n      isSchedule: this.state.tab === 'schedule',\n      isFacilitators: this.state.tab === 'facilitators',\n      goSchedule: () => this.setState({ tab: 'schedule' }),\n      goFacilitators: () => this.setState({ tab: 'facilitators' }),\n      footerStyle: `text-align:center;font-size:11.5px;color:${P.faint};padding:22px 0;border-top:1px solid ${P.border};margin-top:8px;`,\n      ruleColor: P.border,\n      // modal defaults\n      modalShow: false, modalTime: '', modalTitle: '', modalBody: '', modalOutput: '', modalFacs: [],\n      onOverlayClick: (e) => { if (e.target === e.currentTarget) this.setState({ modalIdx: null }); },\n      closeModal: () => this.setState({ modalIdx: null }),\n      // filter defaults\n      facPills: [], hasFilter: !!this.state.facFilter, clearFilter: () => this.setState({ facFilter: null }),\n      filterLabelStyle: `font-size:11.5px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:${P.muted};`,\n      clearFilterStyle: `font-size:11.5px;font-weight:700;color:${accentSolid};background:none;border:none;cursor:pointer;padding:4px 6px;`,\n      weekPickerRowStyle: `display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:10px;`,\n      todayBtnStyle: `font-family:Sora,sans-serif;font-size:12px;font-weight:800;padding:7px 14px;border-radius:20px;cursor:pointer;border:1px solid ${accentSolid};background:transparent;color:${accentSolid};`,\n      dayPickerRowStyle: `display:flex;gap:6px;overflow-x:auto;padding:2px 2px 12px 2px;margin-bottom:14px;`,\n      weekSectionWrapStyle: `overflow-x:auto;`,\n      jumpToday: () => this.scrollToDay(this.todayDayNum),\n      weekChips: [], weekSections: [],\n      // facilitators defaults\n      facLayoutStyle: M ? `display:flex;flex-direction:column;gap:16px;` : `display:grid;grid-template-columns:280px 1fr;gap:24px;align-items:start;`,\n      facRailStyle: `background:${P.panel};border:1px solid ${P.border};border-radius:16px;padding:14px;display:flex;flex-direction:column;gap:10px;max-height:${M ? '320px' : '640px'};`,\n      facSearchStyle: `width:100%;font-family:Manrope,sans-serif;font-size:13px;padding:9px 12px;border-radius:9px;border:1px solid ${P.border2};background:${P.bg};color:${P.text};outline:none;`,\n      facSearch: this.state.facSearch,\n      onFacSearch: (e) => this.setState({ facSearch: e.target.value }),\n      facRail: [],\n      facDetailStyle: `background:${P.panel};border:1px solid ${P.border};border-radius:16px;padding:24px 26px;min-height:400px;`,\n      hasSelectedFac: false, selFacGroups: [],\n      selFacName: '', selFacInitials: '', selFacCountLabel: '',\n    };\n\n    if (!ready) return base;\n\n    // Facilitator pills + rail\n    const facs = this.allFacilitators(this.state.content);\n    const pinLast = 'All Mentors';\n    const pinIdx = facs.indexOf(pinLast);\n    if (pinIdx > -1) facs.push(facs.splice(pinIdx, 1)[0]);\n    const counts = {};\n    this.state.content.forEach(c => this.parseFacs(c.facilitator).forEach(f => { counts[f] = (counts[f] || 0) + 1; }));\n\n    base.facPills = facs.map(f => {\n      const c = this.chip(f, P);\n      const active = this.state.facFilter === f;\n      return {\n        name: f, count: counts[f],\n        onClick: () => this.setState({ facFilter: active ? null : f }),\n        style: `display:inline-flex;align-items:center;gap:6px;font-family:Manrope,sans-serif;font-size:11.5px;font-weight:700;padding:5px 11px;border-radius:20px;cursor:pointer;color:${active ? '#fff' : c.text};background:${active ? accentSolid : c.bg};border:1px solid ${active ? accentSolid : 'transparent'};`,\n        dotStyle: `width:8px;height:8px;border-radius:50%;background:${active ? '#fff' : c.dot};`,\n      };\n    });\n\n    const q = this.state.facSearch.trim().toLowerCase();\n    base.facRail = facs.filter(f => f.toLowerCase().includes(q)).map(f => {\n      const c = this.chip(f, P);\n      const sel = this.state.selectedFac === f;\n      return {\n        name: f, count: counts[f], initials: this.initials(f),\n        onSelect: () => this.setState({ selectedFac: f }),\n        style: `display:flex;align-items:center;gap:10px;width:100%;font-family:Manrope,sans-serif;font-size:13.5px;font-weight:700;padding:9px 10px;border-radius:10px;cursor:pointer;border:1px solid ${sel ? P.border2 : 'transparent'};background:${sel ? (P.dark ? 'rgba(255,255,255,0.06)' : P.panel2) : 'transparent'};color:${P.text};box-shadow:${sel ? `inset 3px 0 0 ${accentSolid}` : 'none'};`,\n        avatarStyle: `width:30px;height:30px;flex:0 0 30px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;background:${c.bg};color:${c.text};`,\n        countStyle: `font-size:11px;font-weight:800;color:${P.faint};background:${P.dark ? 'rgba(255,255,255,0.06)' : '#F0EDE4'};padding:2px 8px;border-radius:20px;`,\n      };\n    });\n\n    // Week chips (\"All\" + Week 1-4)\n    const aw = this.state.activeWeek;\n    base.weekChips = ['all', 1, 2, 3, 4].map(w => {\n      const active = aw === w;\n      const col = w === 'all' ? accentSolid : this.WEEK_COLORS[w];\n      return {\n        num: w, label: w === 'all' ? 'All' : `Week ${w}`,\n        onClick: () => this.setState({ activeWeek: w }),\n        style: `font-family:Sora,sans-serif;font-size:12px;font-weight:800;padding:7px 14px;border-radius:20px;cursor:pointer;border:1px solid ${active ? col : P.border2};background:${active ? col : 'transparent'};color:${active ? '#fff' : P.muted};`,\n      };\n    });\n\n    // Week sections (all 4, or just the filtered one)\n    base.weekSectionWrapStyle = M ? `overflow-x:hidden;` : `overflow-x:auto;`;\n    const weekNums = aw === 'all' ? [1, 2, 3, 4] : [aw];\n    base.weekSections = weekNums.map(w => ({\n      num: w, theme: this.WEEK_THEMES[w],\n      badgeStyle: `font-family:Sora,sans-serif;color:#fff;font-weight:800;font-size:11.5px;padding:5px 12px;border-radius:7px;letter-spacing:.4px;background:${this.WEEK_COLORS[w]};`,\n      themeStyle: `font-size:13px;font-weight:600;color:${P.muted};`,\n      days: this.days.filter(d => d.week === w).map(d => {\n        const weekday = d.date.split(' ')[0];\n        const blocks = [];\n        for (let k = 0; k < d.count; k++) blocks.push(this.makeBlock(d.start + k, P));\n        const highlight = this.state.highlightDay === d.day;\n        const isPast = d.dateObj.getTime() < this.todayMidnight;\n        const dayHasFilterFac = !this.state.facFilter || blocks.some((_, k) => this.parseFacs(this.state.content[d.start + k].facilitator).includes(this.state.facFilter));\n        const filterDim = this.state.facFilter && !dayHasFilterFac;\n        return {\n          setRef: (el) => { if (el) this.dayEls[d.day] = el; },\n          rowStyle: (M\n            ? `display:flex;flex-direction:column;gap:8px;margin-bottom:16px;`\n            : `display:grid;grid-template-columns:196px repeat(4,1fr);gap:10px;margin-bottom:10px;min-width:820px;`)\n            + `opacity:${filterDim ? '0.3' : (isPast ? '0.45' : '1')};`,\n          labelStyle: `background:${P.panel2};border:1px solid ${P.border};border-left:3px solid ${this.WEEK_COLORS[w]};border-radius:12px;padding:12px 14px;display:flex;flex-direction:column;justify-content:center;box-shadow:${highlight ? `0 0 0 3px ${accentSolid}` : 'none'};transition:box-shadow .2s;`,\n          dayNum: `Day ${d.day} · ${weekday}`,\n          dayNumStyle: `font-family:Sora,sans-serif;font-size:10.5px;text-transform:uppercase;letter-spacing:.6px;font-weight:800;color:${accentSolid};`,\n          date: d.date,\n          dateStyle: `font-size:11.5px;color:${P.muted};margin-top:2px;`,\n          title: d.title,\n          titleStyle: `font-size:12.5px;font-weight:700;margin-top:6px;line-height:1.3;color:${P.text};`,\n          blocks,\n        };\n      }),\n    }));\n\n    // Selected facilitator detail\n    const sel = this.state.selectedFac;\n    if (sel) {\n      const c = this.chip(sel, P);\n      base.hasSelectedFac = true;\n      base.selFacName = sel;\n      base.selFacInitials = this.initials(sel);\n      base.selFacCountLabel = `${counts[sel] || 0} session${(counts[sel] || 0) !== 1 ? 's' : ''} across the program`;\n      base.selFacAvatarStyle = `width:52px;height:52px;flex:0 0 52px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-family:Sora,sans-serif;font-size:18px;font-weight:800;background:${c.bg};color:${c.text};`;\n      base.selFacNameStyle = `font-family:Sora,sans-serif;font-size:22px;font-weight:800;color:${P.text};`;\n      base.selFacCountStyle = `font-size:12.5px;font-weight:600;color:${P.muted};margin-top:2px;`;\n      const byWeek = {};\n      this.headers.forEach((h, i) => {\n        if (this.parseFacs(this.state.content[i].facilitator).includes(sel)) {\n          (byWeek[h.week] = byWeek[h.week] || []).push({ i, h });\n        }\n      });\n      base.selFacGroups = Object.keys(byWeek).map(Number).sort((a, b) => a - b).map(w => ({\n        weekLabel: `WEEK ${w}`, theme: this.WEEK_THEMES[w],\n        badgeStyle: `font-family:Sora,sans-serif;color:#fff;font-weight:800;font-size:11px;padding:4px 11px;border-radius:7px;background:${this.WEEK_COLORS[w]};`,\n        themeStyle: `font-size:12px;font-weight:600;color:${P.muted};`,\n        sessions: byWeek[w].map(({ i, h }) => {\n          const cc = this.state.content[i];\n          const titleLine = cc.topic ? cc.topic.split('\\n')[0] : 'Free time';\n          return {\n            dayNum: `Day ${h.day}`, time: h.time, date: h.date, titleLine,\n            onOpen: () => this.setState({ modalIdx: i }),\n            style: `display:flex;align-items:center;gap:14px;width:100%;text-align:left;font-family:Manrope,sans-serif;padding:13px 15px;border-radius:12px;cursor:pointer;border:1px solid ${P.border};background:${P.panel2};color:${P.text};transition:transform .1s,border-color .15s;`,\n            timeChipStyle: `flex:0 0 auto;font-size:10.5px;font-weight:800;color:${P.muted};background:${P.dark ? 'rgba(255,255,255,0.06)' : '#F0EDE4'};padding:5px 10px;border-radius:8px;white-space:nowrap;`,\n            titleColor: `color:${P.text};`,\n            dateStyle: `font-size:11px;color:${P.faint};font-weight:600;`,\n            arrowStyle: `color:${accentSolid};font-weight:800;font-size:16px;`,\n          };\n        }),\n      }));\n    }\n\n    // Modal\n    if (this.state.modalIdx != null) {\n      const i = this.state.modalIdx;\n      const h = this.headers[i];\n      const cc = this.state.content[i];\n      const lines = (cc.topic || '').split('\\n');\n      base.modalShow = true;\n      base.modalTime = `Day ${h.day} · ${h.date} · ${h.time}`;\n      base.modalTitle = lines[0] || 'Free time';\n      base.modalBody = lines.slice(1).join('\\n');\n      base.modalOutput = cc.output || '—';\n      base.modalFacs = this.parseFacs(cc.facilitator).map(f => ({ name: f, chipStyle: this.chipStyle(f, P) }));\n      base.modalCardStyle = `background:${P.panel};border:1px solid ${P.border};border-radius:18px;max-width:540px;width:100%;max-height:85vh;overflow-y:auto;padding:28px 30px;box-shadow:0 24px 70px rgba(0,0,0,0.4);position:relative;`;\n      base.modalCloseStyle = `position:absolute;top:16px;right:18px;background:none;border:none;font-size:26px;line-height:1;cursor:pointer;color:${P.faint};`;\n      base.modalTimeStyle = `font-family:Sora,sans-serif;font-size:11.5px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:${accentSolid};margin-bottom:8px;`;\n      base.modalTitleStyle = `font-family:Sora,sans-serif;font-size:20px;font-weight:800;margin:0 0 14px 0;line-height:1.25;color:${P.text};`;\n      base.modalBodyStyle = `font-size:14px;line-height:1.65;white-space:pre-wrap;margin:0 0 18px 0;color:${P.muted};`;\n      base.modalLabelStyle = `font-size:10.5px;text-transform:uppercase;letter-spacing:.6px;font-weight:800;color:${P.faint};margin-bottom:6px;`;\n      base.modalOutputStyle = `font-size:13.5px;line-height:1.6;white-space:pre-wrap;margin:0;color:${P.text};`;\n    }\n\n    return base;\n  }\n\n  tabStyle(name, P, accent) {\n    const active = this.state.tab === name;\n    return `font-family:Sora,sans-serif;font-size:14px;font-weight:700;padding:12px 18px;background:none;border:none;border-bottom:3px solid ${active ? accent : 'transparent'};cursor:pointer;color:${active ? P.text : P.muted};margin-bottom:-1px;`;\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
