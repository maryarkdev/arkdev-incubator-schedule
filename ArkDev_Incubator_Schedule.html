<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ArkDev Incubator — Schedule</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700;800&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0A0C11; --panel:#141926; --panel2:#1B2233; --elev:#20293B;
    --border:rgba(255,255,255,0.09); --border2:rgba(255,255,255,0.16);
    --text:#EDEFF3; --muted:#8B93A7; --muted2:#5C6478;
    --accent1:#F39200; --accent2:#E2711D;
    --w1:#E2711D; --w2:#C4432E; --w3:#B8842A; --w4:#97271B;
    --open-slot:rgba(255,255,255,0.03);
    --shadow: 0 18px 40px -14px rgba(0,0,0,0.55);
    --radius: 14px;
  }
  html[data-theme="light"]{
    --bg:#F6F3EC; --panel:#FFFFFF; --panel2:#FBF8F2; --elev:#F1ECE1;
    --border:rgba(30,25,15,0.10); --border2:rgba(30,25,15,0.18);
    --text:#211D16; --muted:#6E6656; --muted2:#9A9280;
    --open-slot:rgba(30,25,15,0.03);
    --shadow: 0 14px 32px -16px rgba(60,45,20,0.22);
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--text);font-family:'Manrope',sans-serif;transition:background .25s ease,color .25s ease;}
  ::selection{background:var(--accent1);color:#fff;}
  h1,h2,h3,.disp{font-family:'Sora',sans-serif;}
  button{font-family:inherit;cursor:pointer;}
  @media (prefers-reduced-motion:reduce){ *{animation:none!important;transition:none!important;} }
  @keyframes fadeUp{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
  @keyframes ring{0%{box-shadow:0 0 0 0 rgba(243,146,0,0.55);}100%{box-shadow:0 0 0 10px rgba(243,146,0,0);}}
  .fade{animation:fadeUp .35s ease both;}

  .wrap{max-width:1320px;margin:0 auto;padding:0 26px 90px;}
  a{color:inherit;}

  /* header */
  header.top{display:flex;align-items:center;justify-content:space-between;gap:18px;flex-wrap:wrap;padding:26px 0 18px;border-bottom:1px solid var(--border);}
  .brandrow{display:flex;align-items:center;gap:16px;min-width:0;}
  .logomark{background:#0A0C11;border-radius:12px;padding:9px 14px;display:flex;align-items:center;flex-shrink:0;box-shadow:var(--shadow);}
  .logomark svg{height:26px;display:block;}
  .divider{width:1px;align-self:stretch;background:var(--border2);}
  .eyebrow{font-family:'Sora',sans-serif;font-weight:700;font-size:11.5px;letter-spacing:.14em;color:var(--accent1);text-transform:uppercase;}
  .intro{font-size:14px;color:var(--muted);margin-top:4px;max-width:560px;line-height:1.4;}
  .headerR{display:flex;gap:8px;flex-shrink:0;}
  .btn{border:1px solid var(--border2);background:var(--panel2);color:var(--text);border-radius:10px;padding:9px 14px;font-size:13px;font-weight:600;transition:all .15s ease;white-space:nowrap;}
  .btn:hover{background:var(--elev);border-color:var(--accent2);}
  .btn.on{background:linear-gradient(135deg,var(--accent1),var(--accent2));border-color:transparent;color:#fff;}
  .btn:focus-visible{outline:2px solid var(--accent1);outline-offset:2px;}

  /* tabs */
  nav.tabs{display:flex;align-items:center;gap:4px;padding:16px 0;flex-wrap:wrap;}
  .tabbtn{background:transparent;border:none;color:var(--muted);font-family:'Sora',sans-serif;font-weight:700;font-size:14.5px;padding:9px 4px;position:relative;border-radius:8px;}
  .tabbtn:hover{color:var(--text);}
  .tabbtn.active{color:var(--text);}
  .tabbtn.active::after{content:"";position:absolute;left:2px;right:2px;bottom:-1px;height:3px;border-radius:3px;background:linear-gradient(90deg,var(--accent1),var(--accent2));}
  .tabgap{width:22px;}
  .edithint{font-size:12.5px;color:var(--accent1);background:rgba(243,146,0,0.10);border:1px dashed var(--accent2);padding:6px 12px;border-radius:20px;margin-left:auto;}

  /* ember rail = signature element */
  .emberrail{position:sticky;top:0;height:5px;width:100%;background:linear-gradient(90deg,var(--w1) 0%,var(--w1) 25%,var(--w2) 25%,var(--w2) 50%,var(--w3) 50%,var(--w3) 75%,var(--w4) 75%,var(--w4) 100%);z-index:40;}

  /* week picker */
  .weekpicker{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;}
  .chip{border:1px solid var(--border2);background:var(--panel2);color:var(--muted);border-radius:20px;padding:7px 14px;font-size:12.5px;font-weight:700;transition:all .15s;}
  .chip:hover{color:var(--text);}
  .chip.active{color:#fff;border-color:transparent;}

  .filterrow{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:22px;}
  .filterlabel{font-size:12px;color:var(--muted2);font-weight:700;letter-spacing:.03em;text-transform:uppercase;}
  .pill{display:flex;align-items:center;gap:6px;border:1px solid var(--border2);background:var(--panel2);color:var(--muted);border-radius:20px;padding:6px 12px 6px 8px;font-size:12.5px;font-weight:600;transition:all .15s;}
  .pill:hover{color:var(--text);}
  .pill.active{background:var(--elev);color:var(--text);border-color:var(--accent2);}
  .dot{width:9px;height:9px;border-radius:50%;display:inline-block;flex-shrink:0;}
  .clearbtn{font-size:12px;color:var(--accent1);background:none;border:none;font-weight:700;text-decoration:underline;text-underline-offset:2px;}

  /* week section */
  .weeksec{margin-bottom:30px;scroll-margin-top:80px;}
  .weekhead{display:flex;align-items:center;gap:12px;margin-bottom:14px;}
  .weekbadge{font-family:'Sora',sans-serif;font-weight:800;font-size:11.5px;letter-spacing:.1em;color:#fff;padding:5px 11px;border-radius:7px;}
  .weektheme{font-size:14px;font-weight:700;color:var(--text);}

  .dayrow{display:grid;grid-template-columns:150px 1fr;gap:18px;padding:16px 0;border-top:1px solid var(--border);transition:background .4s ease;}
  .dayrow.today{outline:2px solid var(--accent1);outline-offset:6px;border-radius:12px;}
  .dayrow.highlight{animation:ring 1.6s ease-out 1;}
  .daylabel .num{font-family:'Sora',sans-serif;font-size:26px;font-weight:800;line-height:1;}
  .daylabel .date{font-size:11.5px;color:var(--muted);margin-top:3px;}
  .daylabel .title{font-size:13px;font-weight:700;color:var(--text);margin-top:8px;line-height:1.3;}
  .todaytag{display:inline-block;margin-top:8px;font-size:10.5px;font-weight:800;letter-spacing:.06em;color:#fff;background:linear-gradient(135deg,var(--accent1),var(--accent2));padding:3px 8px;border-radius:6px;}

  .blockgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
  .block{background:var(--panel);border:1px solid var(--border);border-left:3px solid var(--wcolor,var(--accent2));border-radius:10px;padding:12px 13px;display:flex;flex-direction:column;gap:6px;min-height:118px;text-align:left;transition:transform .15s ease,box-shadow .15s ease,opacity .2s ease,border-color .15s;position:relative;}
  .block:hover{transform:translateY(-2px);box-shadow:var(--shadow);border-color:var(--border2);}
  .block:focus-visible{outline:2px solid var(--accent1);outline-offset:2px;}
  .block.empty{background:var(--open-slot);border-style:dashed;border-left-style:dashed;justify-content:center;align-items:center;color:var(--muted2);font-size:12px;font-weight:600;}
  .block.dim{opacity:.28;}
  .block.match{box-shadow:0 0 0 2px var(--accent1);}
  .block .btime{font-size:10.5px;font-weight:800;letter-spacing:.04em;color:var(--muted2);text-transform:uppercase;}
  .block .btitle{font-size:12.5px;font-weight:700;line-height:1.32;color:var(--text);flex:1;overflow:hidden;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;}
  .facchips{display:flex;flex-wrap:wrap;gap:4px;margin-top:auto;}
  .facchip{font-size:10px;font-weight:700;background:var(--panel2);color:var(--muted);border-radius:6px;padding:2px 6px;border:1px solid var(--border);}
  .dragging{opacity:.35;}
  .block[draggable="true"]{cursor:grab;}
  .block[draggable="true"]:active{cursor:grabbing;}

  /* facilitators tab */
  .faclayout{display:grid;grid-template-columns:250px 1fr;gap:22px;align-items:start;}
  .facrail{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);padding:14px;position:sticky;top:20px;max-height:70vh;display:flex;flex-direction:column;gap:10px;}
  .facsearch{background:var(--panel2);border:1px solid var(--border2);color:var(--text);border-radius:9px;padding:8px 11px;font-size:13px;width:100%;}
  .facsearch:focus-visible{outline:2px solid var(--accent1);}
  .faclist{overflow-y:auto;display:flex;flex-direction:column;gap:3px;padding-right:2px;}
  .facrow{display:flex;align-items:center;gap:9px;background:transparent;border:1px solid transparent;border-radius:9px;padding:7px 8px;color:var(--muted);font-size:13px;font-weight:600;text-align:left;}
  .facrow:hover{background:var(--panel2);color:var(--text);}
  .facrow.sel{background:var(--elev);color:var(--text);border-color:var(--border2);}
  .avatar{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10.5px;font-weight:800;color:#fff;flex-shrink:0;}
  .facname{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .faccount{font-size:11px;color:var(--muted2);background:var(--panel2);border-radius:10px;padding:1px 7px;}

  .facdetail{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);padding:24px;min-height:300px;}
  .fachead{display:flex;align-items:center;gap:15px;margin-bottom:18px;}
  .avatar.lg{width:52px;height:52px;font-size:17px;}
  .facdname{font-family:'Sora',sans-serif;font-size:19px;font-weight:800;}
  .faddcount{font-size:12.5px;color:var(--muted);margin-top:2px;}
  .rule{height:1px;background:var(--border);margin:0 0 18px;}
  .facgroup{margin-bottom:20px;}
  .facsessrow{display:flex;align-items:center;gap:12px;width:100%;background:var(--panel2);border:1px solid var(--border);border-radius:10px;padding:11px 13px;margin-bottom:7px;text-align:left;transition:border-color .15s;}
  .facsessrow:hover{border-color:var(--accent2);}
  .timechip{font-size:10.5px;font-weight:800;color:#fff;background:var(--wcolor,var(--accent2));border-radius:6px;padding:3px 8px;flex-shrink:0;white-space:nowrap;}
  .sessbody{flex:1;min-width:0;}
  .sesstitle{font-size:13px;font-weight:700;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .sessdate{font-size:11px;color:var(--muted);margin-top:2px;}
  .arrow{color:var(--muted2);flex-shrink:0;}

  /* modal */
  .overlay{position:fixed;inset:0;background:rgba(6,8,12,0.62);backdrop-filter:blur(3px);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px;}
  .modalcard{background:var(--panel);border:1px solid var(--border2);border-radius:18px;padding:28px 30px;max-width:560px;width:100%;max-height:85vh;overflow-y:auto;position:relative;box-shadow:0 30px 60px -20px rgba(0,0,0,0.6);}
  .modalclose{position:absolute;top:14px;right:14px;background:var(--panel2);border:1px solid var(--border2);color:var(--text);width:32px;height:32px;border-radius:9px;font-size:17px;line-height:1;display:flex;align-items:center;justify-content:center;}
  .modaltime{font-size:11.5px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:#fff;background:var(--wcolor,var(--accent2));display:inline-block;padding:4px 10px;border-radius:7px;margin-bottom:12px;}
  .modaltitle{font-family:'Sora',sans-serif;font-size:20px;font-weight:800;margin:0 0 14px;line-height:1.25;}
  .modalbody p{font-size:13.5px;line-height:1.6;color:var(--muted);margin:0 0 10px;}
  .modallabel{font-size:11px;font-weight:800;letter-spacing:.07em;text-transform:uppercase;color:var(--muted2);margin:16px 0 8px;}
  .modaloutput{font-size:13.5px;line-height:1.55;color:var(--text);margin:0;}

  .footer{text-align:center;font-size:11.5px;color:var(--muted2);padding-top:36px;}

  @media (max-width:900px){
    .faclayout{grid-template-columns:1fr;}
    .facrail{position:static;max-height:none;}
    .blockgrid{grid-template-columns:1fr 1fr;}
    .dayrow{grid-template-columns:1fr;}
    .daylabel{display:flex;align-items:baseline;gap:10px;}
    .daylabel .title{margin-top:0;}
  }
  @media (max-width:520px){
    .blockgrid{grid-template-columns:1fr;}
    .wrap{padding:0 16px 70px;}
  }
</style>
</head>

l leadership panel: the brief, the build, and what they'd do next. Followed by 1:1 feedback, a 30/60/90-day plan, and certificates.", "facilitator": "HR", "output": "Delivered presentation + personal 30/60/90-day plan"}], "note": null}];


const WEEK_THEMES = {
  1: 'Welcome — Culture, History & Client-Readiness',
  2: 'Tools & the Web — Git/Jira, Frontend & JS',
  3: 'Building the Backend — APIs, Data & Delivery',
  4: 'Applying — Quality, AI & Capstone',
};
const WEEK_COLORS = { 1:'#E2711D', 2:'#C4432E', 3:'#B8842A', 4:'#97271B' };
const STORAGE_KEY = 'arkdev-incubator-schedule-v1';
const THEME_KEY = 'arkdev-incubator-theme';

/* ---------- build flattened structure ---------- */
const MONTHS = {January:0,February:1,March:2,April:3,May:4,June:5,July:6,August:7,September:8,October:9,November:10,December:11};
let headers = [];
let origContent = [];
RAW_DAYS.forEach(d=>{
  d.blocks.forEach((b,bi)=>{
    headers.push({week:d.week, day:d.day, date:d.date, title:d.title, time:b.time, blockIdx:bi});
    origContent.push({topic:b.topic||'', facilitator:b.facilitator||'', output:b.output||''});
  });
});
function dateObjFor(dateStr){
  const parts = dateStr.split(',');
  const dayNum = parseInt(parts[0].trim().split(' ')[1],10);
  const monthName = (parts[1]||'').trim();
  return new Date(2026, MONTHS[monthName] ?? 6, dayNum||1);
}
const days = RAW_DAYS.map(d=>({week:d.week, day:d.day, date:d.date, title:d.title, dateObj:dateObjFor(d.date)}));

let content = null;
try{
  const s = localStorage.getItem(STORAGE_KEY);
  if(s){ const p = JSON.parse(s); if(Array.isArray(p) && p.length===origContent.length) content = p; }
}catch(e){}
if(!content) content = JSON.parse(JSON.stringify(origContent));

function persist(){ try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(content)); }catch(e){} }

function parseFacs(str){
  if(!str) return [];
  let s = str.replace(/\([^)]*\)/g,' ').replace(/incl\.?/gi, ',');
  return s.split(/[\/,]| and /i).map(x=>x.trim()).filter(Boolean);
}
function allFacilitators(){
  const set = new Set();
  content.forEach(c=> parseFacs(c.facilitator).forEach(f=>set.add(f)));
  return [...set].sort((a,b)=>a.localeCompare(b));
}
function hue(name){ let h=0; for(let i=0;i<name.length;i++) h = name.charCodeAt(i) + ((h<<5)-h); return Math.abs(h)%360; }
function initials(name){ return name.split(/\s+/).map(w=>w[0]).join('').slice(0,2).toUpperCase(); }

/* ---------- state ---------- */
const today = new Date(); today.setHours(0,0,0,0);
const todayTime = today.getTime();
const exactDay = days.find(d=>d.dateObj.getTime()===todayTime);
const upcomingDay = exactDay || days.find(d=>d.dateObj.getTime()>=todayTime) || days[days.length-1];

let state = {
  theme: localStorage.getItem(THEME_KEY) || 'dark',
  tab: 'schedule',
  facFilter: null,
  editMode: false,
  selectedFac: null,
  facSearch: '',
  modalIdx: null,
  highlightDay: null,
  dragSrc: null,
};
document.documentElement.setAttribute('data-theme', state.theme);

/* ---------- rendering ---------- */
const main = document.getElementById('main');
const modalRoot = document.getElementById('modalRoot');

function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function firstLine(topic){ if(!topic) return ''; return topic.split('\n')[0]; }

function render(){
  document.getElementById('themeBtn').textContent = state.theme==='dark' ? '☀ Light' : '● Dark';
  document.getElementById('editBtn').textContent = state.editMode ? 'Done editing' : 'Edit';
  document.getElementById('editBtn').className = 'btn' + (state.editMode ? ' on' : '');
  document.getElementById('resetBtn').style.display = state.editMode ? '' : 'none';
  document.getElementById('editHint').style.display = state.editMode ? '' : 'none';
  document.getElementById('tabSchedule').className = 'tabbtn' + (state.tab==='schedule' ? ' active' : '');
  document.getElementById('tabFacilitators').className = 'tabbtn' + (state.tab==='facilitators' ? ' active' : '');

  main.innerHTML = state.tab==='schedule' ? scheduleHTML() : facilitatorsHTML();
  wireScheduleEvents();
  renderModal();
}

function scheduleHTML(){
  const weekChips = [1,2,3,4].map(w=>`<button class="chip" data-week="${w}" style="${state.activeWeek===w?`background:${WEEK_COLORS[w]};border-color:transparent;color:#fff;`:''}">Week ${w}</button>`).join('');
  const facs = allFacilitators();
  const pills = facs.map(f=>{
    const active = state.facFilter===f;
    const count = content.filter(c=>parseFacs(c.facilitator).includes(f)).length;
    return `<button class="pill${active?' active':''}" data-fac="${esc(f)}"><span class="dot" style="background:hsl(${hue(f)},62%,52%)"></span>${esc(f)} · ${count}</button>`;
  }).join('');

  const weekSections = [1,2,3,4].map(w=>{
    const weekDays = days.filter(d=>d.week===w);
    const dayRows = weekDays.map(d=>{
      const isToday = exactDay && d.day===exactDay.day;
      const isHL = state.highlightDay===d.day;
      const dayHasFacMatch = state.facFilter ? headers.some((h,idx)=> h.day===d.day && parseFacs(content[idx].facilitator).includes(state.facFilter)) : false;
      const blocksHTML = headers.map((h,idx)=>{
        if(h.day!==d.day) return '';
        const c = content[idx];
        const facList = parseFacs(c.facilitator);
        const hasContent = !!c.topic.trim();
        const matchesFilter = state.facFilter ? facList.includes(state.facFilter) : true;
        let cls = 'block' + (hasContent?'':' empty');
        if(state.facFilter && dayHasFacMatch){ cls += matchesFilter ? ' match' : ' dim'; }
        const chips = facList.map(f=>`<span class="facchip">${esc(f)}</span>`).join('');
        return `<div class="${cls}" style="--wcolor:${WEEK_COLORS[w]}" data-idx="${idx}" tabindex="0" role="button" ${state.editMode && hasContent ? 'draggable="true"' : ''}>
          <div class="btime">${esc(h.time)}</div>
          ${hasContent ? `<div class="btitle">${esc(firstLine(c.topic))}</div><div class="facchips">${chips}</div>` : `<div>— Open slot —</div>`}
        </div>`;
      }).join('');
      return `<div class="dayrow${isToday?' today':''}${isHL?' highlight':''}" data-day="${d.day}">
        <div class="daylabel">
          <div class="num" style="color:${WEEK_COLORS[w]}">Day ${d.day}</div>
          <div class="date">${esc(d.date)}</div>
          <div class="title">${esc(d.title)}</div>
          ${isToday ? '<div class="todaytag">TODAY</div>' : ''}
        </div>
        <div class="blockgrid">${blocksHTML}</div>
      </div>`;
    }).join('');
    return `<div class="weeksec" id="week-${w}">
      <div class="weekhead">
        <span class="weekbadge" style="background:${WEEK_COLORS[w]}">WEEK ${w}</span>
        <span class="weektheme">${esc(WEEK_THEMES[w])}</span>
      </div>
      ${dayRows}
    </div>`;
  }).join('');

  return `<section class="fade">
    <div class="weekpicker">
      <button class="chip" id="todayChip">◉ Jump to today</button>
      ${weekChips}
    </div>
    <div class="filterrow">
      <span class="filterlabel">Filter by facilitator</span>
      <div style="display:flex;flex-wrap:wrap;gap:7px;">${pills}</div>
      ${state.facFilter ? '<button class="clearbtn" id="clearFilter">Clear</button>' : ''}
    </div>
    ${weekSections}
  </section>`;
}

function facilitatorsHTML(){
  const facs = allFacilitators().filter(f=>f.toLowerCase().includes(state.facSearch.toLowerCase()));
  if(!state.selectedFac || !facs.includes(state.selectedFac)) state.selectedFac = facs[0] || null;

  const rail = facs.map(f=>{
    const count = content.filter(c=>parseFacs(c.facilitator).includes(f)).length;
    const sel = state.selectedFac===f;
    return `<button class="facrow${sel?' sel':''}" data-selfac="${esc(f)}">
      <span class="avatar" style="background:hsl(${hue(f)},58%,42%)">${esc(initials(f))}</span>
      <span class="facname">${esc(f)}</span>
      <span class="faccount">${count}</span>
    </button>`;
  }).join('');

  let detail = `<div style="color:var(--muted);font-size:13.5px;">No facilitator selected.</div>`;
  if(state.selectedFac){
    const f = state.selectedFac;
    const idxs = headers.map((h,idx)=>idx).filter(idx=>parseFacs(content[idx].facilitator).includes(f));
    const byWeek = {1:[],2:[],3:[],4:[]};
    idxs.forEach(idx=>byWeek[headers[idx].week].push(idx));
    const groups = [1,2,3,4].filter(w=>byWeek[w].length).map(w=>{
      const rows = byWeek[w].map(idx=>{
        const h = headers[idx]; const c = content[idx];
        const dayInfo = days.find(d=>d.day===h.day);
        return `<button class="facsessrow" data-idx="${idx}">
          <span class="timechip" style="--wcolor:${WEEK_COLORS[w]}">Day ${h.day} · ${esc(h.time)}</span>
          <span class="sessbody">
            <div class="sesstitle">${esc(firstLine(c.topic))}</div>
            <div class="sessdate">${esc(dayInfo?dayInfo.date:'')}</div>
          </span>
          <span class="arrow">→</span>
        </button>`;
      }).join('');
      return `<div class="facgroup">
        <div class="weekhead" style="margin-bottom:10px;">
          <span class="weekbadge" style="background:${WEEK_COLORS[w]}">WEEK ${w}</span>
          <span class="weektheme">${esc(WEEK_THEMES[w])}</span>
        </div>
        ${rows}
      </div>`;
    }).join('');
    detail = `<div class="fachead">
        <span class="avatar lg" style="background:hsl(${hue(f)},58%,42%)">${esc(initials(f))}</span>
        <div><div class="facdname">${esc(f)}</div><div class="faddcount">${idxs.length} session${idxs.length===1?'':'s'} across the program</div></div>
      </div>
      <div class="rule"></div>
      ${groups}`;
  }

  return `<section class="fade">
    <div class="faclayout">
      <aside class="facrail">
        <input class="facsearch" id="facSearchInput" placeholder="Search facilitators…" value="${esc(state.facSearch)}">
        <div class="faclist">${rail || '<div style="color:var(--muted);font-size:12.5px;padding:8px;">No matches</div>'}</div>
      </aside>
      <div class="facdetail">${detail}</div>
    </div>
  </section>`;
}

function renderModal(){
  if(state.modalIdx===null){ modalRoot.innerHTML=''; return; }
  const idx = state.modalIdx;
  const h = headers[idx]; const c = content[idx];
  const w = h.week;
  const topics = c.topic.split('\n');
  const outputs = c.output.split('\n');
  const bodyHTML = topics.map(t=>`<p>${esc(t)}</p>`).join('');
  const facs = parseFacs(c.facilitator).map(f=>`<span class="facchip">${esc(f)}</span>`).join('');
  const outputHTML = outputs.map(o=>`<p class="modaloutput">${esc(o)}</p>`).join('');
  modalRoot.innerHTML = `<div class="overlay fade" id="overlay">
    <div class="modalcard">
      <button class="modalclose" id="modalCloseBtn">×</button>
      <div class="modaltime" style="--wcolor:${WEEK_COLORS[w]}">Day ${h.day} · ${esc(h.time)}</div>
      <h3 class="modaltitle">${esc(h.title)}</h3>
      <div class="modalbody">${bodyHTML}</div>
      <div class="modallabel">Facilitator</div>
      <div class="facchips" style="margin-bottom:4px;">${facs}</div>
      <div class="modallabel">Expected output</div>
      ${outputHTML}
    </div>
  </div>`;
  document.getElementById('overlay').addEventListener('click', e=>{ if(e.target.id==='overlay'){ state.modalIdx=null; render(); } });
  document.getElementById('modalCloseBtn').addEventListener('click', ()=>{ state.modalIdx=null; render(); });
}

/* ---------- events ---------- */
function wireScheduleEvents(){
  if(state.tab==='schedule'){
    document.querySelectorAll('[data-week]').forEach(el=>el.addEventListener('click',()=>{
      state.activeWeek = state.activeWeek===+el.dataset.week ? null : +el.dataset.week;
      document.getElementById('week-'+el.dataset.week).scrollIntoView({behavior:'smooth', block:'start'});
    }));
    document.getElementById('todayChip').addEventListener('click',()=>{
      state.highlightDay = upcomingDay.day;
      render();
      const row = document.querySelector('[data-day="'+upcomingDay.day+'"]');
      if(row) row.scrollIntoView({behavior:'smooth', block:'center'});
      setTimeout(()=>{ if(state.highlightDay===upcomingDay.day){ state.highlightDay=null; render(); } }, 1800);
    });
    document.querySelectorAll('[data-fac]').forEach(el=>el.addEventListener('click',()=>{
      const f = el.dataset.fac;
      state.facFilter = state.facFilter===f ? null : f;
      render();
    }));
    const cf = document.getElementById('clearFilter');
    if(cf) cf.addEventListener('click', ()=>{ state.facFilter=null; render(); });

    document.querySelectorAll('.block').forEach(el=>{
      el.addEventListener('click', ()=>{ state.modalIdx = +el.dataset.idx; render(); });
      el.addEventListener('keydown', e=>{ if(e.key==='Enter'||e.key===' '){ e.preventDefault(); state.modalIdx=+el.dataset.idx; render(); } });
      if(state.editMode){
        el.addEventListener('dragstart', e=>{ state.dragSrc = +el.dataset.idx; el.classList.add('dragging'); e.dataTransfer.effectAllowed='move'; });
        el.addEventListener('dragend', ()=>{ el.classList.remove('dragging'); });
        el.addEventListener('dragover', e=>{ e.preventDefault(); });
        el.addEventListener('drop', e=>{
          e.preventDefault();
          const dest = +el.dataset.idx;
          if(state.dragSrc===null || state.dragSrc===dest) return;
          const tmp = content[dest]; content[dest] = content[state.dragSrc]; content[state.dragSrc] = tmp;
          state.dragSrc = null;
          persist();
          render();
        });
      }
    });
  } else {
    const search = document.getElementById('facSearchInput');
    if(search){
      search.addEventListener('input', e=>{ state.facSearch = e.target.value; render(); setTimeout(()=>{ const s=document.getElementById('facSearchInput'); if(s){ s.focus(); s.setSelectionRange(s.value.length,s.value.length);} },0); });
    }
    document.querySelectorAll('[data-selfac]').forEach(el=>el.addEventListener('click',()=>{ state.selectedFac = el.dataset.selfac; render(); }));
    document.querySelectorAll('[data-idx]').forEach(el=>el.addEventListener('click',()=>{ state.modalIdx = +el.dataset.idx; render(); }));
  }
}

document.getElementById('themeBtn').addEventListener('click', ()=>{
  state.theme = state.theme==='dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', state.theme);
  try{ localStorage.setItem(THEME_KEY, state.theme); }catch(e){}
});
document.getElementById('editBtn').addEventListener('click', ()=>{ state.editMode = !state.editMode; render(); });
document.getElementById('resetBtn').addEventListener('click', ()=>{
  content = JSON.parse(JSON.stringify(origContent));
  persist();
  render();
});
document.getElementById('tabSchedule').addEventListener('click', ()=>{ state.tab='schedule'; render(); });
document.getElementById('tabFacilitators').addEventListener('click', ()=>{ state.tab='facilitators'; render(); });
document.addEventListener('keydown', e=>{ if(e.key==='Escape' && state.modalIdx!==null){ state.modalIdx=null; render(); } });

render();
</script>
</body>
</html>
